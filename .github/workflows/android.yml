name: Android CI

# Manual-only — every run publishes a GitHub Release with the freshly
# built debug APK so the in-app updater can pick it up. Set `release_tag`
# to a custom tag (e.g. v1.2.0) or leave blank and the workflow auto-
# generates `ci-YYYYMMDD-HHMMSS` from the run's UTC timestamp.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.2.0). Leave blank to auto-tag with UTC timestamp."
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release (excluded from /releases/latest and the in-app updater)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # softprops/action-gh-release needs this to publish

jobs:
  build:
    name: Build & publish debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Lint
        run: ./gradlew :app:lintDebug --stacktrace --warning-mode=summary
        continue-on-error: true

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --warning-mode=summary

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="ci-$(date -u +%Y%m%d-%H%M%S)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing release tag: $TAG"

      - name: Rename APK
        id: rename
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             dist/pckeyboard-${{ steps.tag.outputs.tag }}.apk
          echo "apk_path=dist/pckeyboard-${{ steps.tag.outputs.tag }}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pckeyboard-debug
          path: ${{ steps.rename.outputs.apk_path }}
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: ${{ steps.rename.outputs.apk_path }}
