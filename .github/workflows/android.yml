name: Android CI

# Manual-only — pass a release tag in the input to also publish a GitHub
# Release with the built debug APK attached.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag for a GitHub Release (leave empty to only upload as artifact)"
        required: false
        type: string

permissions:
  contents: write   # softprops/action-gh-release needs this when release_tag is set

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Lint
        run: ./gradlew :app:lintDebug --stacktrace --warning-mode=summary
        continue-on-error: true

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --warning-mode=summary

      - name: Rename APK with version
        id: rename
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
             dist/pckeyboard-debug.apk
          echo "apk_path=dist/pckeyboard-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pckeyboard-debug
          path: dist/pckeyboard-debug.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      # Publish a GitHub Release with the APK so the in-app updater can find
      # it. Skipped when release_tag is empty (artifact-only build).
      - name: Create GitHub Release
        if: ${{ inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          generate_release_notes: true
          files: ${{ steps.rename.outputs.apk_path }}
